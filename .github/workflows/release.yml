name: release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  package:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: mac-arm64
            archive: tar.gz
          - target: linux-arm64
            archive: tar.gz
          - target: linux-x64
            archive: tar.gz
          - target: windows-x64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build archive
        run: |
          python scripts/build_release.py \
            --target "${{ matrix.target }}" \
            --archive "${{ matrix.archive }}" \
            --version "${{ github.ref_name }}" \
            --output release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.target }}"
          path: release/*

  draft-release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/**/*
